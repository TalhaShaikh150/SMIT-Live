  <h1>Book A Table Now</h1>
     <h3>Please fill out the form below to reserve your table.</h3>

     <form action="">

      <table>
        <tr>
          <td>First Name:</td>
          <td><input type="text" placeholder="Name"></td>
        </tr>
        

        <tr>
          <td>Email:</td>
          <td><input type="email" placeholder="Email"></td>
        </tr>

        <tr>
          <td>Date:</td>
          <td><input type="date"  placeholder="Choose Date Here"></td>
        </tr>

        <tr>
          <td>Time:</td>
          <td><input type="time"  placeholder="Time"></td>
        </tr>

        <tr>
          <td>Number Of People:</td>
          <td><input type="number" style="width: 50px;" ></td>
        </tr>

        <tr>
          <td>Special Request</td>
          <td><textarea name="" id="" rows="4" cols="20" placeholder="Any special requests?"></textarea></td>
        </tr>

        <tr>
          <td></td>
          <td><input type="button" value="Submit"></td>
        </tr>

      </table>

     </form>
